<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Interview Prep</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Highlight -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <!-- Mobile Navbar -->
  <nav class="navbar navbar-light bg-white border-bottom d-md-none">
    <div class="container-fluid">
      <button class="btn btn-outline-secondary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
        ☰
      </button>
      <span class="navbar-brand mb-0 h6">Interview Prep</span>
    </div>
  </nav>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar d-none d-md-block">
      <h6 class="app-title">Concepts</h6>
      <ul id="conceptList" class="concept-list"></ul>
    </aside>

    <!-- Mobile Sidebar -->
    <div class="offcanvas offcanvas-start" id="mobileSidebar">
      <div class="offcanvas-header">
        <h6>Concepts</h6>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul id="mobileConceptList" class="concept-list"></ul>
      </div>
    </div>

    <!-- Main -->
    <main class="main-content">

      <input id="searchInput" class="search-input" placeholder="Search..." />

      <div id="contentContainer"></div>

    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="./js/utils.js"></script>
  <script src="./js/data.service.js"></script>
  <script src="./js/ui.renderer.js"></script>
  <script src="./js/app.js"></script>

</body>

</html>
